<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tayyib Investments LLC | Value-based Investments Advisory</title>
    <style>
        :root {
            --primary-text: #1c2257;   /* Deep Navy Text */
            --heading-color: #ca396f;  /* Elegant Berry/Pink Heading */
            --accent-light: #fdf2f5;   /* Soft Light Pink Tint */
            --text-light: #f7fafc;
            --bg-light: #f8fafc;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            color: var(--primary-text);
            line-height: 1.6;
            background-color: #ffffff;
        }

        /* Navigation Header */
        nav {
            background-color: #ffffff;
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .brand-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 0.5rem 0;
        }

        .logo-bg {
            height: 110px;
            width: auto;
            margin-bottom: -15px;
            z-index: 1;
        }

        .logo-text {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--primary-text);
            letter-spacing: -0.5px;
            z-index: 2;
            text-align: center;
        }

        /* Hero Banner Section */
        header {
            background: linear-gradient(135deg, #1c2257 0%, #2a337e 100%);
            color: var(--text-light);
            padding: 5.5rem 2rem;
            text-align: center;
            border-bottom: 4px solid var(--heading-color);
        }

        .hero-container {
            max-width: 850px;
            margin: 0 auto;
        }

        header h1 {
            font-size: 2.8rem;
            margin-bottom: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        header p {
            font-size: 1.3rem;
            opacity: 0.95;
            font-weight: 300;
            max-width: 700px;
            margin: 0 auto;
            color: #ffffff;
        }

        /* Content Base Styling */
        section {
            padding: 5rem 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-size: 2rem;
            color: var(--heading-color);
            margin-bottom: 2.5rem;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background-color: var(--heading-color);
            margin: 12px auto 0 auto;
        }

        .intro-text {
            font-size: 1.1rem;
            color: var(--primary-text);
            max-width: 900px;
            margin: 0 auto 2.5rem auto;
            text-align: center;
            line-height: 1.7;
        }

        /* Grid Layouts */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
        }

        .card {
            background-color: var(--bg-light);
            padding: 2rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            border-top: 3px solid var(--heading-color);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .card h3 {
            color: var(--heading-color);
            margin-bottom: 1rem;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .card-meta {
            display: inline-block;
            background-color: var(--accent-light);
            color: var(--heading-color);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Table & Fee Architecture Styling */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin: 1.5rem 0 2.5rem 0;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.01);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.95rem;
        }

        th {
            background-color: var(--primary-text);
            color: #ffffff;
            padding: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            background-color: #ffffff;
            color: var(--primary-text);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .table-title {
            font-size: 1.25rem;
            color: var(--heading-color);
            font-weight: 700;
            margin-top: 2rem;
            margin-bottom: 0.5rem;
        }

        /* Operational Framework Area */
        .framework-box {
            background-color: var(--primary-text);
            color: var(--text-light);
            padding: 3rem;
            border-radius: 8px;
            margin-top: 1rem;
            box-shadow: 0 12px 24px rgba(28, 34, 87, 0.15);
        }

        .framework-box h3 {
            color: #ffffff;
            font-size: 1.5rem;
            margin-bottom: 1.25rem;
        }

        .framework-list {
            list-style: none;
            margin-top: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
        }

        @media (max-width: 600px) {
            .framework-list {
                grid-template-columns: 1fr;
            }
            .logo-text { font-size: 1.7rem; }
            .logo-bg { height: 90px; }
            .disc-box { padding: 1.5rem !important; }
        }

        .framework-list li {
            background-color: rgba(255, 255, 255, 0.05);
            padding: 1.25rem 1.5rem 1.25rem 3rem;
            border-radius: 6px;
            position: relative;
            border-left: 3px solid var(--heading-color);
            color: #ffffff;
        }

        .framework-list li::before {
            content: "✓";
            position: absolute;
            left: 1.2rem;
            top: 1.2rem;
            color: #ffffff;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* Discouraged Items List */
        .discouraged-container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2rem;
        }

        .discouraged-list {
            list-style: none;
        }

        .discouraged-list li {
            position: relative;
            padding-left: 2rem;
            margin-bottom: 1rem;
            color: var(--primary-text);
        }

        .discouraged-list li::before {
            content: "✕";
            position: absolute;
            left: 0;
            color: var(--heading-color);
            font-weight: bold;
        }

        /* Custom Information & Disclaimer Blocks */
        .disc-box {
            background-color: #fafafa;
            border-left: 4px solid var(--heading-color);
            padding: 2.5rem;
            border-radius: 0 6px 6px 0;
            margin-top: 1.5rem;
            font-size: 0.95rem;
            color: var(--primary-text);
        }

        .disc-box h4 {
            color: var(--heading-color);
            margin-bottom: 0.75rem;
            font-size: 1.1rem;
        }

        .note-highlight {
            background-color: #fffbeb;
            border: 1px dashed #f59e0b;
            padding: 1.25rem;
            border-radius: 6px;
            margin-top: 2rem;
            color: #b45309;
            font-size: 0.95rem;
        }

        /* Communication Section */
        .contact-container {
            text-align: center;
            background-color: var(--accent-light);
            padding: 4rem 2rem;
            border-radius: 8px;
            border: 1px solid rgba(202, 57, 111, 0.1);
        }

        .contact-email {
            font-weight: 600;
            color: var(--heading-color);
            font-size: 1.3rem;
            margin-top: 1.5rem;
            letter-spacing: 0.5px;
        }

        /* Regulatory Disclosures & Footer */
        footer {
            background-color: #0d1130;
            color: #a0aec0;
            padding: 4.5rem 2rem 2.5rem 2rem;
            font-size: 0.85rem;
            border-top: 4px solid var(--heading-color);
        }

        .footer-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .disclosure-text {
            text-align: justify;
            line-height: 1.75;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #1c2257;
            color: #cbd5e1;
        }

        .footer-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            color: #cbd5e1;
            width: 100%;
        }

        .process-substep {
            margin-top: 0.75rem;
            padding-left: 1rem;
            border-left: 2px solid #e2e8f0;
            font-size: 0.9rem;
        }
    </style>
</head>

        <div class="nav-container">
            <div class="brand-wrapper">
                <img src="final logo.png" alt="Tayyib Investments Logo" class="logo-bg">
                <div class="logo-text">Tayyib Investments LLC</div>
            </div>
        </div>
    </nav>

            <h1>Value-based Investments Advisory</h1>
            <p>Prioritizing values and faith in investments, designed for clients seeking halal-compliant investment strategies.</p>
        </div>
    </header>

        <h2 class="section-title">Introduction & Background</h2>
        <div class="intro-text">
            <p style="margin-bottom: 1.5rem;">

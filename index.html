        body {

            line-height: 1.6;

        nav {

            position: relative;
            padding: 0.5rem 0;
        }

        .logo-bg {

            width: auto;
            margin-bottom: -15px;
            z-index: 1;
        }

        .logo-text {
            font-size: 2.2rem;

            z-index: 2;
            text-align: center;
        }

        /* Hero Banner Section */
        header {
            background: linear-gradient(135deg, #1c2257 0%, #2a337e 100%);
            color: var(--text-light);
            padding: 5.5rem 2rem;
            text-align: center;
            border-bottom: 4px solid var(--heading-color);
        }

        .hero-container {
            max-width: 850px;
            margin: 0 auto;
        }

        header h1 {
            font-size: 2.8rem;

            letter-spacing: -0.5px;
            color: #ffffff; /* Enhanced contrast against dark background */
        }

        header p {

            opacity: 0.95;
            font-weight: 300;
            max-width: 700px;
            margin: 0 auto;
            color: #ffffff;
        }

            position: relative;
